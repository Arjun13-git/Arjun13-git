name: GitHub-Profile-3D-Contrib

on:
  schedule: 
    - cron: "0 18 * * *" # Runs daily to update your graph
  workflow_dispatch:

# ADDED: This grants the workflow permission to push the SVG file to your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4 # UPGRADED: From v3 to v4 to fix the Node warning
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "generated 3d profile" || echo "No changes to commit"
          git push
